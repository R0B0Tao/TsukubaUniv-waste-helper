name: Fix feedback version

on:
  push:
    paths:
      - '.github/workflows/fix-feedback-version.yml'

permissions:
  contents: write

jobs:
  fix-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct feedback version
        run: |
          sed -i "s/const VERSION='beta-v14\.3'/const VERSION='beta-v1.4'/" index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Fix feedback version to beta v1.4"
          git push
