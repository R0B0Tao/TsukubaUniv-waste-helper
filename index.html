ic acid','sulfuric acid h2so4 硫酸',{acid:1,record:1}],['nitric acid','nitric acid hno3 硝酸',{acid:1}],['acetic acid','acetic acid 酢酸 乙酸',{acid:1,organic:1}],['hf','hf hydrofluoric acid フッ化水素酸 氢氟酸',{acid:1,fluoride:1}],['naf','naf sodium fluoride フッ化ナトリウム 氟化钠',{fluoride:1}],['phosphate','phosphate phosphoric acid リン酸 磷酸',{phosphate:1}],['cyanide','cyanide nacn kcn シアン 氰化物 氰化钠',{cyanide:1}],['mercury','mercury hg 水銀 汞',{mercury:1}],['arsenic','arsenic as ヒ素 砷',{arsenic:1}],['chromate','chromate dichromate chromium vi cr6 クロム酸 六価クロム 铬酸 六价铬',{chromate:1}],['copper','copper cu cuso4 銅 铜',{heavy:1}],['lead','lead pb 鉛 铅',{heavy:1}],['cadmium','cadmium cd カドミウム 镉',{heavy:1}],['iron','iron fe 鉄 铁',{heavy:1}],['mineral oil','mineral oil oil waste oil silicone oil 鉱物油 油 废油',{organic:1,oil:1}],['bleach','bleach sodium hypochlorite naclo 次亜塩素酸ナトリウム 漂白剂 次氯酸钠',{inorganic:1,reactive:1}],['medium','medium agar lb培地 培地 culture medium 培养基',{bio:1}],['animal tissue','animal tissue tissue blood serum cells bacteria virus 動物組織 血液 細胞 細菌 ウイルス 动物组织 血液 细胞 细菌 病毒',{bio:1}]];
const reagentDB=R.map(([name,aliases,flags])=>({name,aliases:aliases.split(/\s+/).filter(Boolean),flags}));
let lang='ja', comps=[], ratios={}, last=null;const manual=new Set();
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)], txt=k=>I[lang][k]||I.en[k]||k;
function norm(s){return String(s||'').toLowerCase().replace(/[‐‑‒–—―ー]/g,'-').replace(/[\s_]+/g,' ').trim()}
function detectLang(){const saved=localStorage.getItem(CONFIG.storage+'lang');if(saved)return saved;const n=(navigator.language||'').toLowerCase();if(n.startsWith('zh'))return 'zh';if(n.startsWith('en'))return 'en';return 'ja'}
function setLang(l,save){lang=l;if(save)localStorage.setItem(CONFIG.storage+'lang',l);document.documentElement.lang=l;$$('[data-t]').forEach(e=>e.textContent=txt(e.dataset.t));$$('.lang').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));$('#q').placeholder=l==='ja'?'例: PFA + MilliQ':l==='zh'?'例如: PFA + MilliQ':'e.g. PFA + MilliQ';$('#fbText').placeholder=l==='ja'?'補足事項を入力できます。':l==='zh'?'可以填写补充说明。':'Optional notes.';$('#notes').innerHTML=txt('notes').map(n=>`<li>${esc(n)}</li>`).join('');renderHistory();if(last)renderResult(last);renderRatio();}
function splitInput(q){return q.replace(/\s+\/\s+/g,'+').split(/\+|\n|,|;|、|，|；/).map(s=>s.trim()).filter(Boolean)}
function matchReagent(raw){const n=norm(raw);let best=null,score=0;for(const r of reagentDB){for(const a of r.aliases){const an=norm(a);let sc=0;if(n===an)sc=100;else if(n.includes(an)||an.includes(n))sc=Math.min(n.length,an.length)*3;if(sc>score){score=sc;best=r}}}return score>=6?{raw,name:best.name,known:true,flags:best.flags}:{raw,name:raw,known:false,flags:{}}}
function parse(){const list=splitInput($('#q').value);comps=list.map(matchReagent);if(comps.length)renderRatio();else $('#ratio').hidden=true;return comps}
function unitKind(u){if(u==='%')return 'percent';if(['µL','mL','L'].includes(u))return 'vol';if(['mg','g','kg'].includes(u))return 'mass';return 'none'}
function toMl(v,u){v=+v;if(!isFinite(v))return 0;return u==='µL'?v/1000:u==='mL'?v:u==='L'?v*1000:0}
function toG(v,u){v=+v;if(!isFinite(v))return 0;return u==='mg'?v/1000:u==='g'?v:u==='kg'?v*1000:0}
function readRatios(){const arr=[];$$('.ratio-row').forEach(row=>{const i=+row.dataset.i,c=comps[i],value=row.querySelector('input').value.trim(),unit=row.querySelector('select').value;if(value)arr.push({c,value:parseFloat(value),unit,kind:unitKind(unit)})});if(!arr.length)return {used:false,msg:txt('ratioUnused')};if(arr.some(x=>!isFinite(x.value)))return {used:false,msg:txt('ratioUnused')};const kinds=new Set(arr.map(x=>x.kind));let water=0,halogen=0,solidWV=0,highSolid=false,mixed=false;if(kinds.size===1&&kinds.has('percent')){const total=arr.reduce((s,x)=>s+x.value,0)||100;for(const x of arr){const p=x.value/total*100;if(x.c.name==='water'||x.c.flags.aqueous)water+=p;if(x.c.flags.halogen)halogen+=p}return {used:true,water,halogen,msg:txt('ratioUsed')}}
if(kinds.size===1&&kinds.has('vol')){const total=arr.reduce((s,x)=>s+toMl(x.value,x.unit),0)||1;for(const x of arr){const p=toMl(x.value,x.unit)/total*100;if(x.c.name==='water'||x.c.flags.aqueous)water+=p;if(x.c.flags.halogen)halogen+=p}return {used:true,water,halogen,msg:txt('ratioUsed')}}
if(kinds.size===1&&kinds.has('mass')){const total=arr.reduce((s,x)=>s+toG(x.value,x.unit),0)||1;for(const x of arr){const p=toG(x.value,x.unit)/total*100;if(x.c.name==='water'||x.c.flags.aqueous)water+=p;if(x.c.flags.halogen)halogen+=p}return {used:true,water,halogen,msg:txt('ratioUsed')}}
if(kinds.has('vol')&&kinds.has('mass')&&!kinds.has('percent')){let liquidG=0,solidG=0,waterG=0,halogenG=0,liquidMl=0;for(const x of arr){if(x.kind==='vol'){const ml=toMl(x.value,x.unit);liquidMl+=ml;liquidG+=ml;if(x.c.name==='water'||x.c.flags.aqueous)waterG+=ml;if(x.c.flags.halogen)halogenG+=ml}else if(x.kind==='mass'){const g=toG(x.value,x.unit);if(x.c.flags.organic||x.c.flags.halogen||x.c.name==='water')liquidG+=g;else solidG+=g;if(x.c.name==='water'||x.c.flags.aqueous)waterG+=g;if(x.c.flags.halogen)halogenG+=g}}
const total=liquidG+solidG||1;water=waterG/total*100;halogen=halogenG/total*100;solidWV=liquidMl?solidG/liquidMl*100:0;highSolid=solidWV>25;return {used:true,water,halogen,solidWV,highSolid,msg:highSolid?txt('highSolid'):txt('ratioUsed')}}
return {used:false,mixed:true,msg:txt('ratioMixed')}}
function classify(){const ratio=readRatios();const f={};for(const c of comps)Object.assign(f,Object.fromEntries(Object.keys(c.flags).map(k=>[k,true])));if(manual.has('aqueous'))f.aqueous=true;if(manual.has('halogen'))f.halogen=true;if(manual.has('metal'))f.heavy=true;if(manual.has('oil'))f.oil=true;if(ratio.highSolid)return out('consult',txt('highSolid'),true,ratio);if(f.bio)return out('bio','bio',true,ratio);if(f.reactive)return out('consult','reactive',true,ratio);if(f.cyanide)return out('cyanide','cyanide',true,ratio);if(f.mercury)return out('mercury','mercury',true,ratio);if(f.fluoride||f.phosphate)return out('fluoride','fluoride/phosphate',true,ratio);if(f.arsenic)return out('arsenic','arsenic',true,ratio);if(f.chromate)return out('chromate','chromate',true,ratio);if(f.heavy)return out('heavy','heavy metal',true,ratio);const hasOrganic=!!f.organic,water40=ratio.used?ratio.water>=40:!!f.aqueous,halogen5=ratio.used?ratio.halogen>=5:!!f.halogen;if(hasOrganic){if(f.halogen&&halogen5)return out('halogen','halogenated organic component',true,ratio);if(water40)return out('aqueousOrg','aqueous organic mixture',false,ratio);if(f.oil)return out('oil','oil phase or waste oil',false,ratio);return out('general','organic solvent',false,ratio)}if(f.acid)return out('acid','acid',true,ratio);if(f.alkali)return out('alkali','alkali',true,ratio);if(comps.length&&comps.every(c=>c.name==='water'||c.flags.aqueous))return out('sink','non-toxic aqueous component',false,ratio);if(!comps.length)return out('consult',txt('noMatch'),true,ratio);if(comps.some(c=>!c.known))return out('consult',txt('noMatch'),true,ratio);return out('inorganic','inorganic component',true,ratio)}
function out(bucket,reason,danger,ratio){return last={bucket,reason,danger,ratio,components:comps.slice()}}
function submit(save){parse();const res=classify();renderResult(res);if(save&&$('#q').value.trim())addHistory($('#q').value.trim());renderFeedback();}
function bText(id){const x=B[id]||B.consult;return {title:x[lang][0],sub:x[lang][1]}}
function renderResult(res){const b=bText(res.bucket),cls=res.danger?'danger':res.bucket==='consult'?'warn':'ok';$('#result').innerHTML=`<div class="card ${cls}"><div class="label">${txt('bucket')}</div><div class="bucket">${esc(b.title)}</div><div class="sub">${esc(b.sub)}</div></div><div class="grid"><div class="card mini"><h3>${txt('reason')}</h3><p>${esc(reasonText(res))}</p></div><div class="card mini"><h3>${txt('caution')}</h3><p>${esc(cautionText(res))}</p></div><div class="card mini"><h3>${txt('components')}</h3><p>${res.components.map(c=>esc(c.known?`${c.raw} → ${c.name}`:c.raw)).join('<br>')||esc(txt('noMatch'))}</p></div></div>`;renderFeedback();}
function reasonText(res){const r=res.reason;if(r==='bio')return lang==='ja'?'生物・感染性成分が含まれる可能性があります。':lang==='zh'?'可能含有生物或感染性成分。':'Biological or infectious components may be present.';if(r==='reactive')return lang==='ja'?'反応性または酸化性成分として扱います。':lang==='zh'?'按反应性或氧化性成分处理。':'Treat as reactive or oxidizing material.';if(r.includes('halogen'))return lang==='ja'?'ハロゲン化有機成分が 5% 以上と判断されました。':lang==='zh'?'判断为卤代有机成分达到或超过 5%。':'Halogenated organic component is judged to be 5% or higher.';if(r.includes('aqueous'))return lang==='ja'?'水を 40% 以上含む有機廃液として判断しました。':lang==='zh'?'判断为含水量达到或超过 40% 的有机废液。':'Judged as organic waste containing 40% or more water.';if(r.includes('organic'))return lang==='ja'?'有機溶媒成分が中心です。':lang==='zh'?'主要成分为有机溶剂。':'Main component is an organic solvent.';if(r.includes('heavy'))return lang==='ja'?'重金属成分を含む可能性があります。':lang==='zh'?'可能含有重金属成分。':'Heavy metal component may be present.';if(['cyanide','mercury','arsenic','chromate','acid','alkali'].includes(r))return r;return r||txt('noMatch')}
function cautionText(res){let s=[];if(res.ratio&&res.ratio.msg)s.push(res.ratio.msg);if(res.bucket==='cyanide')s.push(lang==='ja'?'シアン系廃液のみ pH 10 以上に調整します。':lang==='zh'?'氰化物废液需要按规定保持 pH 10 以上。':'Cyanide waste should be kept at pH 10 or higher.');if(['halogen','aqueousOrg','general','oil'].includes(res.bucket))s.push(lang==='ja'?'薬品名と概算濃度を記録してください。':lang==='zh'?'请记录药品名和大致浓度。':'Record reagent names and approximate concentrations.');if(res.bucket==='sink')s.push(lang==='ja'?'原液や 1・2 回目洗浄液は流さず、SOP を確認してください。':lang==='zh'?'原液和第 1、2 次洗液不要直接倒入水槽，请确认 SOP。':'Do not pour original liquid or first/second wash into the sink; check SOP.');if(res.bucket==='consult')s.push(lang==='ja'?'自己判断せず、管理者または環境安全管理室へ確認してください。':lang==='zh'?'不要自行判断，请咨询管理人员或环境安全管理部门。':'Do not self-classify; ask the lab manager or safety office.');return s.join(' ')}
function renderRatio(){if(comps.length<2){$('#ratio').hidden=true;return}$('#ratio').hidden=false;$('#rows').innerHTML=comps.map((c,i)=>{const r=ratios[c.raw]||{};return `<div class="ratio-row" data-i="${i}"><div class="rname">${esc(c.raw)}</div><input type="number" step="any" value="${esc(r.value||'')}" placeholder="0"><select>${['%','µL','mL','L','mg','g','kg'].map(u=>`<option ${r.unit===u?'selected':''}>${u}</option>`).join('')}</select></div>`}).join('');$$('.ratio-row input,.ratio-row select').forEach(e=>e.oninput=()=>{for(const row of $$('.ratio-row')){const c=comps[row.dataset.i];ratios[c.raw]={value:row.querySelector('input').value,unit:row.querySelector('select').value}}const rr=readRatios();$('#ratioSummary').textContent=ratioSummary(rr);$('#ratioSummary').className='summary '+(rr.mixed||rr.highSolid?'warn':'');renderResult(classify())});const rr=readRatios();$('#ratioSummary').textContent=ratioSummary(rr);$('#ratioSummary').className='summary '+(rr.mixed||rr.highSolid?'warn':'')}
function ratioSummary(r){if(!r.used)return r.msg;let parts=[r.msg];if(isFinite(r.water))parts.push((lang==='ja'?'水相':lang==='zh'?'水相':'water')+` ${r.water.toFixed(1)}%`);if(isFinite(r.halogen))parts.push((lang==='ja'?'ハロゲン':lang==='zh'?'卤素':'halogen')+` ${r.halogen.toFixed(1)}%`);if(r.solidWV)parts.push((lang==='ja'?'固体':lang==='zh'?'固体':'solid')+` ${r.solidWV.toFixed(1)}% w/v`);return parts.join('；')}
function addHistory(q){let h=history().filter(x=>x!==q);h.unshift(q);localStorage.setItem(CONFIG.storage+'history',JSON.stringify(h.slice(0,12)));renderHistory()}
function history(){try{return JSON.parse(localStorage.getItem(CONFIG.storage+'history')||'[]')}catch{return[]}}
function renderHistory(){const h=history();$('#historyList').innerHTML=h.length?h.map(x=>`<button class="chip" data-h="${esc(x)}">${esc(x)}</button>`).join(''):`<span class="empty">${txt('historyEmpty')}</span>`;$$('[data-h]').forEach(b=>b.onclick=()=>{$('#q').value=b.dataset.h;submit(false);$('#q').focus()})}
function feedbackText(){if(!last)return'';const b=bText(last.bucket);return `${b.title} / ${b.sub}`}
function formUrl(){const u=new URL(CONFIG.form);u.searchParams.set('embedded','true');u.searchParams.set(CONFIG.entry.version,CONFIG.version);u.searchParams.set(CONFIG.entry.language,lang);u.searchParams.set(CONFIG.entry.query,$('#q').value.trim());u.searchParams.set(CONFIG.entry.result,feedbackText());return u.toString()}
function renderFeedback(){const mount=$('#form');if(!mount)return;mount.innerHTML=`<iframe src="${esc(formUrl())}" loading="lazy"></iframe>`}
function payload(){return{createdAt:new Date().toISOString(),version:CONFIG.version,language:lang,query:$('#q').value.trim(),result:feedbackText(),components:comps,manualFlags:[...manual],message:$('#fbText').value.trim(),userAgent:navigator.userAgent}}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function toast(m){$('#toast').textContent=m;$('#toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('#toast').classList.remove('show'),1600)}
$('#searchForm').onsubmit=e=>{e.preventDefault();submit(true);$('#q').blur()};$('#clearRatios').onclick=()=>{ratios={};renderRatio();submit(false)};$('#clearHistory').onclick=()=>{localStorage.removeItem(CONFIG.storage+'history');renderHistory()};$$('.lang').forEach(b=>b.onclick=()=>setLang(b.dataset.lang,true));$$('.condition').forEach(b=>b.onclick=()=>{const f=b.dataset.flag;manual.has(f)?manual.delete(f):manual.add(f);b.classList.toggle('active',manual.has(f));if($('#q').value.trim())submit(false)});$('#toggleFeedback').onclick=()=>{const body=$('#feedbackBody');body.hidden=!body.hidden;$('#toggleFeedback').textContent=body.hidden?txt('open'):txt('close');if(!body.hidden)renderFeedback()};$('#copy').onclick=async()=>{await navigator.clipboard.writeText(JSON.stringify(payload(),null,2));toast(txt('copied'))};$('#download').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(payload(),null,2)],{type:'application/json'}));a.download=`waste-helper-feedback-${Date.now()}.json`;a.click();toast(txt('downloaded'))};$$('[data-go]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.go).scrollIntoView({block:'start'}));setLang(detectLang(),false);renderHistory();
</script>
