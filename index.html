const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));let lang='ja',flags={aq:false,hal:false,metal:false,oil:false,phase:false},items=[],last=null;
function norm(s){return (s||'').toLowerCase().normalize('NFKC').replace(/[\s_\-()（）・]/g,'').replace(/水溶液|solution|aq\.?/g,'')}
function splitQ(q){return q.split(/\s+\/\s+|\+|,|;|；|、|，|\n/).map(x=>x.trim()).filter(Boolean)}
function findReagent(x){let n=norm(x),best=null,score=0;for(const r of R)for(const k of r.keys){const kk=norm(k);let sc=0;if(n===kk)sc=100;else if(n.includes(kk)||kk.includes(n))sc=60;if(sc>score){score=sc;best=r}}return best?{...best,raw:x}:{name:x,raw:x,unknown:1}}
function t(k){return (T[lang]&&T[lang][k])||T.en[k]||k}
function setLang(l,save=false){lang=T[l]?l:'ja';document.documentElement.lang=lang;if(save)localStorage.setItem(STORE+'manualLang',lang);localStorage.removeItem(STORE+'lang');$$('[data-i]').forEach(e=>e.textContent=t(e.dataset.i));$('#q').placeholder=lang==='zh'?'例如 PFA + MilliQ':lang==='en'?'e.g. PFA + MilliQ':'例: PFA + MilliQ';$$('.lang').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));renderNotes();renderHistory();if(items.length)renderRows();if(last)renderResult(last)}
function initLang(){const saved=localStorage.getItem(STORE+'manualLang');if(saved)return setLang(saved,false);const nav=(navigator.language||'ja').toLowerCase();setLang(nav.startsWith('zh')?'zh':nav.startsWith('en')?'en':'ja',false)}
function saveHistory(q){let h=JSON.parse(localStorage.getItem(STORE+'history')||'[]').filter(x=>x!==q);h.unshift(q);h=h.slice(0,12);localStorage.setItem(STORE+'history',JSON.stringify(h));renderHistory()}
function renderHistory(){const box=$('#history'),h=JSON.parse(localStorage.getItem(STORE+'history')||'[]');box.innerHTML='';if(!h.length){box.innerHTML=`<p class="help">${t('emptyHistory')}</p>`;return}h.forEach(x=>{const b=document.createElement('button');b.className='chip';b.type='button';b.textContent=x;b.onclick=()=>{$('#q').value=x;search()};box.appendChild(b)})}
function renderNotes(){const ul=$('#notes');ul.innerHTML='';t('notes').forEach(n=>{const li=document.createElement('li');li.textContent=n;ul.appendChild(li)})}
function renderRows(){const rows=$('#rows');rows.innerHTML='';if(items.length<2){$('#ratio').hidden=true;return}$('#ratio').hidden=false;items.forEach((it,i)=>{const d=it.ratio||{};const row=document.createElement('div');row.className='row';row.innerHTML=`<div class="rname">${esc(it.raw)}</div><input inputmode="decimal" data-idx="${i}" value="${esc(d.v||'')}"><select data-idx="${i}"><option>%</option><option>µL</option><option>mL</option><option>L</option><option>mg</option><option>g</option><option>kg</option></select>`;rows.appendChild(row);row.querySelector('select').value=d.u||'%'});$$('#rows input').forEach(i=>i.oninput=e=>{items[+e.target.dataset.idx].ratio.v=e.target.value;updateRatioOnly()});$$('#rows select').forEach(s=>s.onchange=e=>{items[+e.target.dataset.idx].ratio.u=e.target.value;updateRatioOnly()});updateRatioOnly()}
function num(x){if(x==null)return NaN;const m=String(x).trim().match(/^([-+]?\d+(?:\.\d+)?)/);return m?Number(m[1]):NaN}
function vol(v,u){if(!isFinite(v))return 0;if(u==='µL')return v/1000;if(u==='mL')return v;if(u==='L')return v*1000;return 0}
function mass(v,u){if(!isFinite(v))return 0;if(u==='mg')return v/1000;if(u==='g')return v;if(u==='kg')return v*1000;return 0}
function ratioInfo(arr){let has=false,pctSum=0,volSum=0,aqVol=0,halVol=0,massSum=0,msg=[],warn=false,bad=false;for(const it of arr){const v=num(it.ratio?.v),u=it.ratio?.u;if(!isFinite(v))continue;has=true;if(u==='%'){pctSum+=v;if(it.aq||it.aqsol)aqVol+=v;if(it.hal)halVol+=v}else if(['µL','mL','L'].includes(u)){const ml=vol(v,u);volSum+=ml;if(it.aq||it.aqsol)aqVol+=ml;if(it.hal)halVol+=ml}else{massSum+=mass(v,u)}}let aqPct=null,halPct=null;if(volSum>0){aqPct=aqVol/volSum*100;halPct=halVol/volSum*100;msg.push(w('aqueous',aqPct));msg.push(w('halogen',halPct))}else if(pctSum>0){aqPct=aqVol/pctSum*100;halPct=halVol/pctSum*100;msg.push(w('aqueous',aqPct));msg.push(w('halogen',halPct))}if(massSum>0&&volSum>0){const wv=massSum/volSum*100;msg.push(w('wv',wv));if(wv>30){bad=true;msg.push(w('highwv',wv))}else if(wv>10){warn=true;msg.push(w('medwv',wv))}}if(!has)return{used:false,msg:t('ratioNone')};return{used:true,aqPct,halPct,warn,bad,msg:msg.filter(Boolean).join('；')}}
function w(k,v){const n=Math.round(v*10)/10;if(lang==='zh')return k==='aqueous'?`水相约 ${n}%`:k==='halogen'?`卤代有机约 ${n}%`:k==='wv'?`重量/体积浓度约 ${n}% w/v`:k==='highwv'?'浓度异常高，请确认是否真的是废液':k==='medwv'?'浓度偏高，请谨慎确认':'';if(lang==='en')return k==='aqueous'?`aqueous phase about ${n}%`:k==='halogen'?`halogenated solvent about ${n}%`:k==='wv'?`mass/volume concentration about ${n}% w/v`:k==='highwv'?'unusually high concentration; confirm this is liquid waste':k==='medwv'?'high concentration; confirm carefully':'';return k==='aqueous'?`水相 約 ${n}%`:k==='halogen'?`ハロゲン系溶媒 約 ${n}%`:k==='wv'?`重量/体積濃度 約 ${n}% w/v`:k==='highwv'?'濃度が異常に高いため、廃液であることを確認してください':k==='medwv'?'濃度が高めです。慎重に確認してください':''}
function updateRatioOnly(){const info=ratioInfo(items),el=$('#ratioSummary');el.className='summary';if(!info.used){el.textContent=info.msg;return}el.textContent=t('ratioUsed')+'：'+info.msg;if(info.warn)el.classList.add('warn');if(info.bad)el.classList.add('bad');if(last)renderResult(classify(items))}
function classify(arr){const info=ratioInfo(arr),has=p=>arr.some(x=>x[p])||flags[p];let cat='confirm',sev='ok',why=[],note=[];if(info.bad){cat='confirm';sev='warn';why.push(t('ratioWarn'))}else if(flags.phase){cat='confirm';sev='warn';why.push(lang==='zh'?'两相分离时应分液后分别判断。':lang==='en'?'Two-phase waste should be separated and classified individually.':'二層分離している場合は分液して別々に分類してください。')}else if(has('bio')||has('hazard')){cat='confirm';sev='warn';why.push(lang==='zh'?'包含生物、感染性或特殊危险成分，不能自动判断。':lang==='en'?'Biological, infectious, or special hazardous components require confirmation.':'生物・感染性・特殊危険成分は自動判断しません。')}else{let organic=has('org')||has('solvent')||has('oil'),inorg=has('inorg')||has('metal')||has('acid')||has('alkali')||has('oxidizer'),aq=(flags.aq||((info.aqPct??0)>=40)),hal=(flags.hal||(info.halPct!=null?info.halPct>=5:has('hal'))),oil=flags.oil||has('oil');if(organic){if(hal)cat='halogen';else if(aq)cat='aqueousOrg';else if(oil)cat='oil';else cat='general';if(inorg)note.push(lang==='zh'?'同时含无机/酸碱/金属成分，请在标签或申请信息中记录。':lang==='en'?'Also record inorganic, acid/alkali, or metal components on the label/application.':'無機成分、酸/アルカリ、金属成分も荷札・申込情報に記録してください。')}else if(inorg){if(has('acid'))cat='acid';else if(has('alkali'))cat='alkali';else cat='inorganic'}else if(aq){cat='confirm';why.push(lang==='zh'?'看起来主要是水系废液，但未识别到明确有害成分。请确认是否可按无毒缓冲液/洗液规则处理。':lang==='en'?'This appears aqueous, but no hazardous component was identified. Confirm buffer/rinse-water rules.':'水系廃液に見えますが、有害成分を特定できません。緩衝液・洗浄水ルールを確認してください。')}else{cat='confirm';why.push(t('nomatch'))}}if(!why.length){if(cat==='halogen')why.push(lang==='zh'?'含卤代有机溶剂达到或可能达到 5%。':lang==='en'?'Contains or may contain halogenated solvent at ≥5%.':'ハロゲン系溶媒を 5% 以上含む、またはその可能性があります。');else if(cat==='aqueousOrg')why.push(lang==='zh'?'含有机成分，且水相达到或可能达到 40%。':lang==='en'?'Contains organic component and aqueous phase is or may be ≥40%.':'有機成分を含み、水相が 40% 以上です。');else if(cat==='general')why.push(lang==='zh'?'含有机溶剂，水相未达到 40%，卤代有机未达到 5%。':lang==='en'?'Organic solvent waste with aqueous phase <40% and halogenated solvent <5%.':'有機溶媒を含み、水相 40% 未満、ハロゲン系溶媒 5% 未満です。');else if(cat==='oil')why.push(lang==='zh'?'含油相或废油。':lang==='en'?'Contains oil phase or waste oil.':'油相または廃油を含みます。');else if(cat==='acid'||cat==='alkali'||cat==='inorganic')why.push(lang==='zh'?'未识别到有机主成分，按无机系路线判断。':lang==='en'?'No main organic component was identified; use the inorganic route.':'有機主成分を認識しないため、無機系ルートで判断します。')}if(info.used){note.push(info.msg);if(info.warn)sev='warn'}note.push(lang==='zh'?'本结果只用于分流辅助，最终以 SDS、实验室 SOP 和学校通知为准。':lang==='en'?'This is a sorting aid only; follow SDS, lab SOP, and university instructions.':'これは分別補助です。最終判断は SDS、研究室 SOP、大学通知に従ってください。');return{cat,sev,why,note,info,arr}}
function search(){const q=$('#q').value.trim();if(!q)return;items=splitQ(q).map(x=>({...findReagent(x),ratio:{v:'',u:'%'}}));saveHistory(q);renderRows();renderResult(classify(items))}
function renderResult(r){last=r;const c=CAT[r.cat]||CAT.confirm,box=$('#result'),names=r.arr.map(x=>x.name||x.raw).join(' + ');box.innerHTML=`<article class="card ${r.cat==='confirm'?'warn':r.sev}"><div class="label">${t('bucket')}</div><div class="bucket">${esc(c[lang][0])}</div><div class="sub">${esc(c[lang][1])}</div></article><div class="grid"><article class="card mini"><h3>${t('reason')}</h3><p>${esc(r.why.join(' '))}</p></article><article class="card mini"><h3>${t('caution')}</h3><p>${esc(r.note.join(' '))}</p></article><article class="card mini"><h3>${t('components')}</h3><p>${esc(names)}</p></article></div><p class="result-disclaimer">${esc(t('resultNotice'))}</p>`;prepareFeedback()}
function prepareFeedback(){const q=$('#q').value.trim(),res=last?(CAT[last.cat]||CAT.confirm)[lang][0]:'';const url=new URL(FORM);url.searchParams.set('embedded','true');url.searchParams.set(ENTRY.version,VERSION);url.searchParams.set(ENTRY.lang,lang);url.searchParams.set(ENTRY.query,q);url.searchParams.set(ENTRY.result,res);$('#gform').innerHTML=`<iframe src="${url.toString()}" loading="lazy"></iframe>`;$('#fbText').value=JSON.stringify({version:VERSION,language:lang,query:q,result:res,time:new Date().toISOString()},null,2)}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(s){const x=$('#toast');x.textContent=s;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1500)}
$$('.lang').forEach(b=>b.onclick=()=>setLang(b.dataset.lang,true));
$('#formSearch').onsubmit=e=>{e.preventDefault();search()};
$('#clearRatio').onclick=()=>{items.forEach(x=>x.ratio={v:'',u:'%'});renderRows();if(items.length)renderResult(classify(items))};
$('#clearHistory').onclick=()=>{localStorage.removeItem(STORE+'history');renderHistory()};
$$('.cond').forEach(b=>b.onclick=()=>{const f=b.dataset.flag;flags[f]=!flags[f];b.classList.toggle('active',flags[f]);if(items.length)renderResult(classify(items))});
$('#toggleFb').onclick=()=>{const body=$('#fbBody'),open=body.hidden;body.hidden=!open;$('#toggleFb').textContent=open?t('close'):t('open');if(open)prepareFeedback()};
$('#copyFb').onclick=async()=>{await navigator.clipboard.writeText($('#fbText').value);toast(t('copied'))};
$('#saveFb').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#fbText').value],{type:'application/json'}));a.download='waste-helper-feedback.json';a.click();toast(t('saved'))};
$$('[data-go]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.go)?.scrollIntoView({behavior:'smooth',block:'start'}));
initLang();
</script>
