function mass(v,u){if(!isFinite(v))return 0;if(u==='mg')return v/1000;if(u==='g')return v;if(u==='kg')return v*1000;return 0}
function ratioInfo(arr){let has=false,pctSum=0,volSum=0,aqVol=0,halVol=0,massSum=0,msg=[],warn=false,bad=false;for(const it of arr){const v=num(it.ratio?.v),u=it.ratio?.u;if(!isFinite(v))continue;has=true;if(u==='%'){pctSum+=v;if(it.aq||it.aqsol)aqVol+=v;if(it.hal)halVol+=v}else if(['ВөL','mL','L'].includes(u)){const ml=vol(v,u);volSum+=ml;if(it.aq||it.aqsol)aqVol+=ml;if(it.hal)halVol+=ml}else{massSum+=mass(v,u)}}let aqPct=null,halPct=null;if(volSum>0){aqPct=aqVol/volSum*100;halPct=halVol/volSum*100;msg.push(w('aqueous',aqPct));msg.push(w('halogen',halPct))}else if(pctSum>0){aqPct=aqVol/pctSum*100;halPct=halVol/pctSum*100;msg.push(w('aqueous',aqPct));msg.push(w('halogen',halPct))}if(massSum>0&&volSum>0){const wv=massSum/volSum*100;msg.push(w('wv',wv));if(wv>30){bad=true;msg.push(w('highwv',wv))}else if(wv>10){warn=true;msg.push(w('medwv',wv))}}if(!has)return{used:false,msg:t('ratioNone')};return{used:true,aqPct,halPct,warn,bad,msg:msg.filter(Boolean).join('пјӣ')}}
function w(k,v){const n=Math.round(v*10)/10;if(lang==='zh')return k==='aqueous'?`ж°ҙзӣёзәҰ ${n}%`:k==='halogen'?`еҚӨд»ЈжңүжңәзәҰ ${n}%`:k==='wv'?`йҮҚйҮҸ/дҪ“з§Ҝжө“еәҰзәҰ ${n}% w/v`:k==='highwv'?'жө“еәҰејӮеёёй«ҳпјҢиҜ·зЎ®и®ӨжҳҜеҗҰзңҹзҡ„жҳҜеәҹж¶І':k==='medwv'?'жө“еәҰеҒҸй«ҳпјҢиҜ·и°Ёж…ҺзЎ®и®Ө':'';if(lang==='en')return k==='aqueous'?`aqueous phase about ${n}%`:k==='halogen'?`halogenated solvent about ${n}%`:k==='wv'?`mass/volume concentration about ${n}% w/v`:k==='highwv'?'unusually high concentration; confirm this is liquid waste':k==='medwv'?'high concentration; confirm carefully':'';return k==='aqueous'?`ж°ҙзӣё зҙ„ ${n}%`:k==='halogen'?`гғҸгғӯгӮІгғізі»жә¶еӘ’ зҙ„ ${n}%`:k==='wv'?`йҮҚйҮҸ/дҪ“з©ҚжҝғеәҰ зҙ„ ${n}% w/v`:k==='highwv'?'жҝғеәҰгҒҢз•°еёёгҒ«й«ҳгҒ„гҒҹгӮҒгҖҒе»ғж¶ІгҒ§гҒӮгӮӢгҒ“гҒЁгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„':k==='medwv'?'жҝғеәҰгҒҢй«ҳгӮҒгҒ§гҒҷгҖӮж…ҺйҮҚгҒ«зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„':''}
function updateRatioOnly(){const info=ratioInfo(items),el=$('#ratioSummary');el.className='summary';if(!info.used){el.textContent=info.msg;return}el.textContent=t('ratioUsed')+'пјҡ'+info.msg;if(info.warn)el.classList.add('warn');if(info.bad)el.classList.add('bad');if(last)renderResult(classify(items))}
function classify(arr){const info=ratioInfo(arr),has=p=>arr.some(x=>x[p])||flags[p];let cat='confirm',sev='ok',why=[],note=[];if(info.bad){cat='confirm';sev='warn';why.push(t('ratioWarn'))}else if(flags.phase){cat='confirm';sev='warn';why.push(lang==='zh'?'дёӨзӣёеҲҶзҰ»ж—¶еә”еҲҶж¶ІеҗҺеҲҶеҲ«еҲӨж–ӯгҖӮ':lang==='en'?'Two-phase waste should be separated and classified individually.':'дәҢеұӨеҲҶйӣўгҒ—гҒҰгҒ„гӮӢе ҙеҗҲгҒҜеҲҶж¶ІгҒ—гҒҰеҲҘгҖ…гҒ«еҲҶйЎһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ')}else if(has('bio')||has('hazard')){cat='confirm';sev='warn';why.push(lang==='zh'?'еҢ…еҗ«з”ҹзү©гҖҒж„ҹжҹ“жҖ§жҲ–зү№ж®ҠеҚұйҷ©жҲҗеҲҶпјҢдёҚиғҪиҮӘеҠЁеҲӨж–ӯгҖӮ':lang==='en'?'Biological, infectious, or special hazardous components require confirmation.':'з”ҹзү©гғ»ж„ҹжҹ“жҖ§гғ»зү№ж®ҠеҚұйҷәжҲҗеҲҶгҒҜиҮӘеӢ•еҲӨж–ӯгҒ—гҒҫгҒӣгӮ“гҖӮ')}else{let organic=has('org')||has('solvent')||has('oil'),inorg=has('inorg')||has('metal')||has('acid')||has('alkali')||has('oxidizer'),aq=(flags.aq||((info.aqPct??0)>=40)),hal=(flags.hal||(info.halPct!=null?info.halPct>=5:has('hal'))),oil=flags.oil||has('oil');if(organic){if(hal)cat='halogen';else if(aq)cat='aqueousOrg';else if(oil)cat='oil';else cat='general';if(inorg)note.push(lang==='zh'?'еҗҢж—¶еҗ«ж— жңә/й…ёзўұ/йҮ‘еұһжҲҗеҲҶпјҢиҜ·еңЁж ҮзӯҫжҲ–з”іиҜ·дҝЎжҒҜдёӯи®°еҪ•гҖӮ':lang==='en'?'Also record inorganic, acid/alkali, or metal components on the label/application.':'з„Ўж©ҹжҲҗеҲҶгҖҒй…ё/гӮўгғ«гӮ«гғӘгҖҒйҮ‘еұһжҲҗеҲҶгӮӮиҚ·жңӯгғ»з”іиҫјжғ…е ұгҒ«иЁҳйҢІгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ')}else if(inorg){if(has('acid'))cat='acid';else if(has('alkali'))cat='alkali';else cat='inorganic'}else if(aq){cat='confirm';why.push(lang==='zh'?'зңӢиө·жқҘдё»иҰҒжҳҜж°ҙзі»еәҹж¶ІпјҢдҪҶжңӘиҜҶеҲ«еҲ°жҳҺзЎ®жңүе®іжҲҗеҲҶгҖӮиҜ·зЎ®и®ӨжҳҜеҗҰеҸҜжҢүж— жҜ’зј“еҶІж¶І/жҙ—ж¶Іи§„еҲҷеӨ„зҗҶгҖӮ':lang==='en'?'This appears aqueous, but no hazardous component was identified. Confirm buffer/rinse-water rules.':'ж°ҙзі»е»ғж¶ІгҒ«иҰӢгҒҲгҒҫгҒҷгҒҢгҖҒжңүе®іжҲҗеҲҶгӮ’зү№е®ҡгҒ§гҒҚгҒҫгҒӣгӮ“гҖӮз·©иЎқж¶Ігғ»жҙ—жө„ж°ҙгғ«гғјгғ«гӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ')}else{cat='confirm';why.push(t('nomatch'))}}if(!why.length){if(cat==='halogen')why.push(lang==='zh'?'еҗ«еҚӨд»Јжңүжңәжә¶еүӮиҫҫеҲ°жҲ–еҸҜиғҪиҫҫеҲ° 5%гҖӮ':lang==='en'?'Contains or may contain halogenated solvent at вүҘ5%.':'гғҸгғӯгӮІгғізі»жә¶еӘ’гӮ’ 5% д»ҘдёҠеҗ«гӮҖгҖҒгҒҫгҒҹгҒҜгҒқгҒ®еҸҜиғҪжҖ§гҒҢгҒӮгӮҠгҒҫгҒҷгҖӮ');else if(cat==='aqueousOrg')why.push(lang==='zh'?'еҗ«жңүжңәжҲҗеҲҶпјҢдё”ж°ҙзӣёиҫҫеҲ°жҲ–еҸҜиғҪиҫҫеҲ° 40%гҖӮ':lang==='en'?'Contains organic component and aqueous phase is or may be вүҘ40%.':'жңүж©ҹжҲҗеҲҶгӮ’еҗ«гҒҝгҖҒж°ҙзӣёгҒҢ 40% д»ҘдёҠгҒ§гҒҷгҖӮ');else if(cat==='general')why.push(lang==='zh'?'еҗ«жңүжңәжә¶еүӮпјҢж°ҙзӣёжңӘиҫҫеҲ° 40%пјҢеҚӨд»ЈжңүжңәжңӘиҫҫеҲ° 5%гҖӮ':lang==='en'?'Organic solvent waste with aqueous phase <40% and halogenated solvent <5%.':'жңүж©ҹжә¶еӘ’гӮ’еҗ«гҒҝгҖҒж°ҙзӣё 40% жңӘжәҖгҖҒгғҸгғӯгӮІгғізі»жә¶еӘ’ 5% жңӘжәҖгҒ§гҒҷгҖӮ');else if(cat==='oil')why.push(lang==='zh'?'еҗ«жІ№зӣёжҲ–еәҹжІ№гҖӮ':lang==='en'?'Contains oil phase or waste oil.':'жІ№зӣёгҒҫгҒҹгҒҜе»ғжІ№гӮ’еҗ«гҒҝгҒҫгҒҷгҖӮ');else if(cat==='acid'||cat==='alkali'||cat==='inorganic')why.push(lang==='zh'?'жңӘиҜҶеҲ«еҲ°жңүжңәдё»жҲҗеҲҶпјҢжҢүж— жңәзі»и·ҜзәҝеҲӨж–ӯгҖӮ':lang==='en'?'No main organic component was identified; use the inorganic route.':'жңүж©ҹдё»жҲҗеҲҶгӮ’иӘҚиӯҳгҒ—гҒӘгҒ„гҒҹгӮҒгҖҒз„Ўж©ҹзі»гғ«гғјгғҲгҒ§еҲӨж–ӯгҒ—гҒҫгҒҷгҖӮ')}if(info.used){note.push(info.msg);if(info.warn)sev='warn'}note.push(lang==='zh'?'жң¬з»“жһңеҸӘз”ЁдәҺеҲҶжөҒиҫ…еҠ©пјҢжңҖз»Ҳд»Ҙ SDSгҖҒе®һйӘҢе®Ө SOP е’ҢеӯҰж ЎйҖҡзҹҘдёәеҮҶгҖӮ':lang==='en'?'This is a sorting aid only; follow SDS, lab SOP, and university instructions.':'гҒ“гӮҢгҒҜеҲҶеҲҘиЈңеҠ©гҒ§гҒҷгҖӮжңҖзөӮеҲӨж–ӯгҒҜ SDSгҖҒз ”з©¶е®Ө SOPгҖҒеӨ§еӯҰйҖҡзҹҘгҒ«еҫ“гҒЈгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');return{cat,sev,why,note,info,arr}}
function search(){const q=$('#q').value.trim();if(!q)return;items=splitQ(q).map(x=>({...findReagent(x),ratio:{v:'',u:'%'}}));saveHistory(q);renderRows();renderResult(classify(items))}
function renderResult(r){last=r;const c=CAT[r.cat]||CAT.confirm,box=$('#result'),names=r.arr.map(x=>x.name||x.raw).join(' + ');box.innerHTML=`<article class="card ${r.cat==='confirm'?'warn':r.sev}"><div class="label">${t('bucket')}</div><div class="bucket">${esc(c[lang][0])}</div><div class="sub">${esc(c[lang][1])}</div></article><div class="grid"><article class="card mini"><h3>${t('reason')}</h3><p>${esc(r.why.join(' '))}</p></article><article class="card mini"><h3>${t('caution')}</h3><p>${esc(r.note.join(' '))}</p></article><article class="card mini"><h3>${t('components')}</h3><p>${esc(names)}</p></article></div>`;prepareFeedback()}
function prepareFeedback(){const q=$('#q').value.trim(),res=last?(CAT[last.cat]||CAT.confirm)[lang][0]:'';const url=new URL(FORM);url.searchParams.set('embedded','true');url.searchParams.set(ENTRY.version,VERSION);url.searchParams.set(ENTRY.lang,lang);url.searchParams.set(ENTRY.query,q);url.searchParams.set(ENTRY.result,res);$('#gform').innerHTML=`<iframe src="${url.toString()}" loading="lazy"></iframe>`;$('#fbText').value=JSON.stringify({version:VERSION,language:lang,query:q,result:res,time:new Date().toISOString()},null,2)}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(s){const x=$('#toast');x.textContent=s;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1500)}
$$('.lang').forEach(b=>b.onclick=()=>setLang(b.dataset.lang,true));
$('#formSearch').onsubmit=e=>{e.preventDefault();search()};
$('#clearRatio').onclick=()=>{items.forEach(x=>x.ratio={v:'',u:'%'});renderRows();if(items.length)renderResult(classify(items))};
$('#clearHistory').onclick=()=>{localStorage.removeItem(STORE+'history');renderHistory()};
$$('.cond').forEach(b=>b.onclick=()=>{const f=b.dataset.flag;flags[f]=!flags[f];b.classList.toggle('active',flags[f]);if(items.length)renderResult(classify(items))});
$('#toggleFb').onclick=()=>{const body=$('#fbBody'),open=body.hidden;body.hidden=!open;$('#toggleFb').textContent=open?t('close'):t('open');if(open)prepareFeedback()};
$('#copyFb').onclick=async()=>{await navigator.clipboard.writeText($('#fbText').value);toast(t('copied'))};
$('#saveFb').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#fbText').value],{type:'application/json'}));a.download='waste-helper-feedback.json';a.click();toast(t('saved'))};
$$('[data-go]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.go)?.scrollIntoView({behavior:'smooth',block:'start'}));
initLang();
</script>
